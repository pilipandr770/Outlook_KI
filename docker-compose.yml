services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: kompass_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/kompass_assistant"
    ports:
      - "3000:3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-kompass-assistant}.rule=Host(`${COMPOSE_PROJECT_NAME:-kompass-assistant}.${TRAEFIK_HOST:-localhost}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-kompass-assistant}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-kompass-assistant}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-kompass-assistant}.loadbalancer.server.port=3000

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE_URL: ${ADMIN_API_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-kompass-assistant}-admin.rule=Host(`${COMPOSE_PROJECT_NAME:-kompass-assistant}-admin.${TRAEFIK_HOST:-localhost}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-kompass-assistant}-admin.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-kompass-assistant}-admin.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-kompass-assistant}-admin.loadbalancer.server.port=80

volumes:
  postgres_data:
